<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean View Resort - Reception Portal</title>
    <style>
        /* Modern Typography and a Vibrant Background to see the glass effect */
        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); /* Soft Blue Gradient */
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Glassmorphism Container */
        .glass-container { 
            max-width: 600px; 
            width: 90%;
            margin: auto; 
            background: rgba(255, 255, 255, 0.25); /* Semi-transparent */
            backdrop-filter: blur(15px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); /* Soft depth shadow */
        }

        /* Clean Header */
        h1 { 
            color: #1a1a1a; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 32px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Minimalist Form Elements */
        .form-group { margin-bottom: 25px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #444; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Input fields with glass effect */
        input[type="text"], input[type="date"], select { 
            width: 100%; 
            padding: 14px; 
            border: none;
            background: rgba(255, 255, 255, 0.4); /* Transparent input background */
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            color: #1a1a1a;
        }

        input:focus, select:focus { 
            background: rgba(255, 255, 255, 0.8); /* Becomes more opaque on focus */
            outline: none; 
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3);
        }

        /* Premium Minimalist Button */
        button { 
            background-color: #007aff; /* Apple Blue */
            color: white; 
            padding: 16px 20px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 17px; 
            font-weight: 600; 
            width: 100%; 
            transition: background-color 0.3s ease, transform 0.1s ease; 
            margin-top: 15px; 
        }

        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.98); } /* Subtle click effect */

        /* Enhanced Message Box */
        #message { 
            margin-top: 25px; 
            padding: 15px; 
            display: none; 
            border-radius: 12px; 
            font-weight: 600; 
            text-align: center; 
            font-size: 15px;
        }
        
        .success { 
            background-color: rgba(46, 204, 113, 0.2); 
            color: #1a1a1a; 
            border: 1px solid rgba(46, 204, 113, 0.4); 
            backdrop-filter: blur(5px);
        }
        
        .error { 
            background-color: rgba(231, 76, 60, 0.2); 
            color: #c0392b; 
            border: 1px solid rgba(231, 76, 60, 0.4); 
            backdrop-filter: blur(5px);
        }

        /* Subtle placeholder color */
        ::placeholder { color: #888; opacity: 0.7; }

        /* --- Custom Modal Styling --- */
        #modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent black overlay */
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Ensure it's on top */
            backdrop-filter: blur(5px); /* Gentle blur behind modal */
        }

        #modal-box {
            background: rgba(255, 255, 255, 0.9); /* Slightly opaque white modal background */
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 80%;
            border: 1px solid rgba(255, 255, 255, 0.2); /* Subtle glass border */
        }

        #modal-message-text {
            color: #1a1a1a;
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Style for the close button, reusable modal primary button style */
        .modal-primary-btn {
            background-color: #007aff; /* Match portal main button color */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .modal-primary-btn:hover { background-color: #0056b3; }

        /* Visibility class */
        #modal-overlay.show { display: flex; } /* Flex layout for centering content */
    </style>
</head>
<body>

<div class="glass-container">
    <h1>Ocean View Resort Portal</h1>
    
    <div class="form-group">
        <label>Guest Full Name</label>
        <input type="text" id="guestName" placeholder="e.g. Jane Smith" required>
    </div>
    <div class="form-group">
        <label>Home Address</label>
        <input type="text" id="address" placeholder="e.g. 456 Palm Avenue" required>
    </div>
    <div class="form-group">
        <label>Contact Number</label>
        <input type="text" id="contactNumber" placeholder="e.g. 555-0199" required>
    </div>
    
    <div class="form-group">
        <label>Select Available Room</label>
        <select id="roomNumber" required>
            <option value="">Loading available rooms...</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Check-In Date</label>
        <input type="date" id="checkInDate" required>
    </div>
    <div class="form-group">
        <label>Check-Out Date</label>
        <input type="date" id="checkOutDate" required>
    </div>

    <button onclick="submitReservation()">Confirm Reservation</button>

    <div id="message"></div>
</div>

<div id="modal-overlay">
    <div id="modal-box">
        <p id="modal-message-text"></p>
        <button class="modal-primary-btn" onclick="closeModal()">OK</button>
    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8081/api';

    // Modal control functions
    function showModal(message, isError = false) {
        const modalMessageText = document.getElementById('modal-message-text');
        modalMessageText.innerText = message;
        
        // Optionally style message for error
        if (isError) {
            modalMessageText.style.color = '#c0392b'; // Dark red for errors
        } else {
            modalMessageText.style.color = '#1a1a1a'; // Default black
        }

        document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('show');
    }

    // --- Data fields fixed as per previous turn ---
    async function submitReservation() {
        const data = {
            guestName: document.getElementById('guestName').value,
            address: document.getElementById('address').value,
            contactNumber: document.getElementById('contactNumber').value,
            roomNumber: document.getElementById('roomNumber').value,
            checkInDate: document.getElementById('checkInDate').value,
            checkOutDate: document.getElementById('checkOutDate').value
        };

        try {
            const response = await fetch(`${BASE_URL}/reservations/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.text();
            
            // Updated to use custom modal feedback
            if (response.ok) {
                showModal("Success! " + result); // Friendly success message
                loadAvailableRooms(); // Immediately hide the booked room
                // Clear fields
                document.getElementById('guestName').value = '';
                document.getElementById('address').value = '';
                document.getElementById('contactNumber').value = '';
            } else {
                showModal("Error: " + result, true); // Style as error
            }
        } catch (error) {
            // Updated to use custom modal
            showModal("Booking failed. Is the server running on 8081?", true); // Style as error
        }
    }

    // Function to fetch available rooms and update the dropdown
    async function loadAvailableRooms() {
        const roomSelect = document.getElementById('roomNumber');
        try {
            const response = await fetch(`${BASE_URL}/rooms/available`);
            if (!response.ok) throw new Error('Backend unreachable');
            const rooms = await response.json();
            
            roomSelect.innerHTML = '<option value="">-- Choose a Room --</option>'; 
            rooms.forEach(room => {
                const option = document.createElement('option');
                option.value = room.roomNumber;
                option.text = `Room ${room.roomNumber} (${room.roomType}) - $${room.dailyRate}/night`;
                roomSelect.appendChild(option);
            });
        } catch (error) {
            // Updated error message handling
            roomSelect.innerHTML = '<option value="">Error: Check Backend Connection</option>';
        }
    }

    // Call it when the page loads
    window.onload = loadAvailableRooms;
</script>

</body>
</html>
