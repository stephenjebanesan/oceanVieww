<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Side - Ocean View Admin</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px; 
            box-sizing: border-box;
            color: white;
        }

        .glass { 
            width: 100%; 
            max-width: 900px; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); 
            margin-bottom: 30px;
            position: relative; /* Ensures it stays in its own layer */
            z-index: 1;
        }

        h1 { font-size: 28px; text-align: center; margin: 0 0 30px 0; font-weight: 700; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; margin-bottom: 6px; opacity: 0.8; font-weight: 600; text-transform: uppercase; }

        input { 
            width: 100%; padding: 14px; border: none; background: rgba(255, 255, 255, 0.2); 
            border-radius: 12px; color: white; box-sizing: border-box; outline: none; font-size: 15px;
        }

        button { 
            background-color: white; color: #764ba2; padding: 15px; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; margin-top: 10px;
        }

        /* TABLE FIX: High z-index and pointer-events ensure clicks pass through the glass blur */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            position: relative;
            z-index: 10; 
        }

        th { text-align: left; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 12px; opacity: 0.7; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }

        .status-badge {
            background: rgba(46, 204, 113, 0.2); 
            color: #2ecc71; 
            padding: 5px 12px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 700;
        }

        .delete-btn { 
            background: rgba(231, 76, 60, 0.3); 
            color: #ff4d4d; 
            border: 1px solid rgba(231, 76, 60, 0.5); 
            padding: 8px 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 700;
            position: relative;
            z-index: 20; /* Keep it above everything else */
            pointer-events: auto !important; /* Force it to accept clicks */
        }
        .delete-btn:hover { background: #e74c3c; color: white; }

        #success-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 320px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 24px; text-align: center; color: #1d1d1f; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.4); z-index: 100; 
        }
    </style>
</head>
<body>

    <div class="glass">
        <h1>Hotel Inventory Control</h1>
        <div class="grid">
            <section>
                <div class="form-group">
                    <label>New Room Number</label>
                    <input type="text" id="num" placeholder="e.g. 301">
                </div>
                <div class="form-group">
                    <label>Daily Rate ($)</label>
                    <input type="text" id="rate" placeholder="e.g. 150">
                </div>
                <button onclick="add()">Update Inventory</button>
            </section>
            <section style="display: flex; flex-direction: column; justify-content: center; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 40px;">
                <p style="opacity: 0.9; line-height: 1.6; font-size: 14px;">Manage resort data in real-time. Changes sync instantly with the receptionist portal.</p>
                <button style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);" onclick="fetchBookings()">Refresh List</button>
            </section>
        </div>
    </div>

    <div class="glass" style="max-width: 950px;">
        <h1>Current Reservations</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Guest Name</th>
                    <th>Room</th>
                    <th>Check-In</th>
                    <th>Check-Out</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="bookingsBody"></tbody>
        </table>
    </div>

    <div id="success-modal">
        <h2 id="modal-title" style="color: #28a745;">Success!</h2>
        <p id="modal-msg"></p>
        <button onclick="closeModal()" style="background:#1d1d1f; color:white; width:auto; padding:10px 20px; border-radius:10px;">Dismiss</button>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081/api';

        async function add() {
            const numInput = document.getElementById('num');
            const rateInput = document.getElementById('rate');

            const data = {
                roomNumber: numInput.value,
                dailyRate: parseFloat(rateInput.value),
                roomType: "Standard",
                available: true
            };

            console.log("Sending data to add room:", data);

            try {
                const res = await fetch(`${API_BASE}/rooms/add`, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    // SUCCESS: Show the modal and refresh the list
                    showModal("Inventory Updated", `Room ${data.roomNumber} has been added successfully.`);
                    
                    // Clear the inputs for the next entry
                    numInput.value = '';
                    rateInput.value = '';
                    
                    // Reload the table so you see the new room immediately
                    fetchBookings(); 
                } else {
                    const errorText = await res.text();
                    alert("Error: " + errorText);
                }
            } catch (e) { 
                console.error("Add room failed:", e);
                alert("Server connection error."); 
            }
        }
        async function fetchBookings() {
            const body = document.getElementById('bookingsBody');
            body.innerHTML = '<tr><td colspan="7" style="text-align:center;">Loading...</td></tr>';
            try {
                const res = await fetch(`${API_BASE}/reservations/all`);
                const bookings = await res.json();
                body.innerHTML = '';
                bookings.forEach(b => {
                    const row = `<tr>
                        <td>${b.reservationNumber}</td>
                        <td>${b.guest.guestName}</td>
                        <td>${b.room.roomNumber}</td>
                        <td>${b.checkInDate}</td>
                        <td>${b.checkOutDate}</td>
                        <td><span class="status-badge">Confirmed</span></td>
                        <td><button class="delete-btn" onclick="window.removeBooking(${b.reservationNumber})">Remove</button></td>
                    </tr>`;
                    body.insertAdjacentHTML('beforeend', row);
                });
            } catch (e) { body.innerHTML = '<tr><td colspan="7">Error loading data.</td></tr>'; }
        }
        window.removeBooking = async function(id) {
            // STEP 1: Check if this appears in your F12 Console
            console.log("Attempting to delete ID:", id); 
            
            if(!confirm("Cancel reservation #" + id + "?")) return;
            
            try {
                const res = await fetch(`${API_BASE}/reservations/${id}`, { 
                    method: 'DELETE',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if(res.ok) {
                    const msg = await res.text();
                    showModal("Removed", "Booking has been deleted and the room is free.");
                    // STEP 2: Force a full refresh of the data
                    await fetchBookings(); 
                } else {
                    const errorMsg = await res.text();
                    alert("Server Error: " + errorMsg);
                }
            } catch (e) { 
                console.error("Connection Error:", e);
                alert("Could not connect to the server. Check if Spring Boot is running."); 
            }
        }

        function showModal(title, msg) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('success-modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('success-modal').style.display = 'none'; }
        window.onload = fetchBookings;
    </script>
</body>
</html>
