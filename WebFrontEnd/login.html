<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ocean View</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            margin: 0; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
            color: white;
        }

        .glass { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); 
            text-align: center;
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; font-weight: 700; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; margin-bottom: 6px; opacity: 0.8; font-weight: 600; text-transform: uppercase; }

        input { 
            width: 100%; padding: 14px; border: none; background: rgba(255, 255, 255, 0.2); 
            border-radius: 12px; color: white; box-sizing: border-box; outline: none; font-size: 15px;
        }
        
        input::placeholder { color: rgba(255, 255, 255, 0.6); }

        button { 
            background-color: white; color: #764ba2; padding: 15px; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; margin-top: 10px;
            transition: all 0.3s ease;
        }

        button:hover { background-color: #f0f0f0; transform: translateY(-2px); }

        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="glass">
        <h1>Admin Portal</h1>
        <p>Sign in to manage Ocean View</p>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        
        <button onclick="handleLogin()">Login</button>
        <div id="error-msg">Invalid username or password.</div>
    </div>

<script>
        const API_BASE = 'http://localhost:8081/api';

        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.querySelector('button');

            // Basic frontend validation
            if (!user || !pass) {
                errorMsg.innerText = "Please enter both username and password.";
                errorMsg.style.display = 'block';
                return;
            }

            try {
                btn.innerText = "Authenticating...";
                btn.disabled = true;

                const response = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    // Success! Store the session and redirect
                    sessionStorage.setItem('oceanViewAdminAuth', 'true');
                    window.location.href = 'admin.html';
                } else {
                    // 401 Unauthorized
                    errorMsg.innerText = "Invalid username or password.";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "Server connection failed.";
                errorMsg.style.display = 'block';
            } finally {
                btn.innerText = "Login";
                btn.disabled = false;
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
